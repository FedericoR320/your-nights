<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account | Your Nights</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="topbar">
    <a href="index.html" class="logo">Your Nights</a>
    <nav>
      <a href="index.html">Mappa</a>
      <a href="account.html" class="active">Account</a>
    </nav>
  </header>

  <main class="account-container">

    <section id="auth-section" class="account-card">
      <h1>Il tuo account</h1>
      <p class="account-subtitle">Accedi o registrati per salvare le tue serate.</p>

      <div class="auth-tabs">
        <button id="tab-login" class="tab active">Accedi</button>
        <button id="tab-register" class="tab">Registrati</button>
      </div>

      <div id="login-form" class="auth-form">
        <input id="login-email" type="email" placeholder="Email" />
        <input id="login-password" type="password" placeholder="Password" />
        <button id="btn-login">Accedi</button>
        <p id="login-message" class="auth-message"></p>
      </div>

      <div id="register-form" class="auth-form hidden">
        <input id="register-username" type="text" placeholder="Username" />
        <input id="register-email" type="email" placeholder="Email" />
        <input id="register-password" type="password" placeholder="Password" />
        <button id="btn-register">Crea account</button>
        <p id="register-message" class="auth-message"></p>
      </div>
    </section>

    <section id="profile-section" class="account-card hidden">
      <div class="profile-header">
        <div>
          <h1 id="profile-username">Ciao</h1>
          <p id="profile-email" class="account-subtitle"></p>
        </div>

        <button id="btn-logout" class="secondary-button">Logout</button>
      </div>

      <hr />

      <h2>Le mie serate salvate</h2>
      <div id="saved-events">
        <p class="empty-state">Non hai ancora salvato nessuna serata.</p>
      </div>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="account.js"></script>
</body>
</html>
