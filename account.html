<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account | Your Nights</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="topbar">
    <a href="index.html" class="logo">Your Nights</a>
    <nav>
      <a href="index.html">Mappa</a>
      <a href="account.html" class="active">Account</a>
    </nav>
  </header>

  <div id="account-container">

    <!-- LOGIN -->
    <div id="box-login">
      <h2>Accedi</h2>
      <input id="auth-email" type="email" placeholder="Email" />
      <input id="auth-password" type="password" placeholder="Password" />
      <button id="btn-login">Accedi</button>
      <p id="auth-messaggio"></p>
      <p class="link-switch">Non hai un account? <a id="link-a-registrazione">Registrati</a></p>
    </div>

    <!-- REGISTRAZIONE -->
    <div id="box-registrazione" style="display:none">
      <h2>Crea account</h2>
      <input id="reg-username" type="text" placeholder="Username" />
      <input id="reg-email" type="email" placeholder="Email" />
      <input id="reg-password" type="password" placeholder="Password" />
      <button id="btn-registrati">Crea account</button>
      <p id="reg-messaggio"></p>
      <p class="link-switch">Hai già un account? <a id="link-a-login">Accedi</a></p>
    </div>

    <!-- PROFILO -->
    <div id="box-profilo" style="display:none">
      <h2 id="profilo-nome">Ciao</h2>
      <p id="profilo-benvenuto"></p>
      <button id="btn-logout">Logout</button>
      <h3 style="margin-top:16px; font-size:0.95rem; text-transform:uppercase; letter-spacing:2px; color:#aaa;">Le mie serate salvate</h3>
      <div id="saved-events">
        <p style="color:#555; font-size:0.9rem;">Non hai ancora salvato nessuna serata.</p>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="account.js"></script>
</body>
</html>
