<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Nights</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

  <header>
    <a href="index.html" class="logo">Your Nights</a>
    <div class="cerca-citta">
      <input type="text" id="input-citta" placeholder="Cerca città..." />
      <button id="btn-citta">Vai</button>
    </div>
    <nav>
      <a href="#" class="nav-link" data-vista="calendario" style="display:none">Calendario</a>
      <button class="nav-link" id="btn-notifiche" style="display:none"><i data-lucide="bell"></i></button>
      <span id="nav-saluto" style="display:none; color:#ccc; font-size:0.9rem;"></span>
      <a href="account.html" id="avatar-link" style="display:none">
        <div id="avatar"><i data-lucide="user"></i></div>
      </a>
      <a href="account.html" id="nav-accedi" class="nav-link">Accedi</a>
    </nav>
  </header>

  <div id="vista-mappa">
    <section class="filtri">
      <button class="filtro attivo" data-tipo="tutti">Tutti</button>
      <button class="filtro" data-tipo="jazz">Jazz</button>
      <button class="filtro" data-tipo="live">Live Music</button>
      <button class="filtro" data-tipo="dj">DJ Set</button>
      <button class="filtro" data-tipo="karaoke">Karaoke</button>
      <button class="filtro" data-tipo="sport">Sport</button>
    </section>

    <div id="btn-geolocal-container">
      <button id="btn-geolocal"><i data-lucide="map-pin"></i> Dove sono adesso</button>
    </div>

    <div id="mappa"></div>

    <section id="lista-eventi">
      <h2>Stasera a Torino</h2>
      <div id="cards-container"></div>
    </section>
  </div>

  <div id="vista-calendario" style="display:none;">
    <div class="cal-header">
      <button id="mese-prec"><i data-lucide="arrow-left"></i></button>
      <h2 id="mese-titolo"></h2>
      <button id="mese-succ"><i data-lucide="arrow-right"></i></button>
    </div>
    <div id="cal-griglia"></div>
    <section id="eventi-giorno">
      <h2 id="eventi-giorno-titolo"></h2>
      <div id="eventi-giorno-container"></div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
