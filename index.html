<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Nights</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/index.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css">
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css">
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
</head>
<body>

  <header>
    <a href="index.html" class="logo">Your Nights</a>

    <div class="cerca-citta" id="barra-ricerca" style="display:none">
      <input type="text" id="input-citta" placeholder="Cerca città..." />
      <button id="btn-citta">Vai</button>
      <div id="risultati-ricerca" class="global-search-results"></div>
    </div>

    <nav>
      <a href="locali.html" class="nav-link">Locali</a>
      <a href="#" class="nav-link" data-vista="calendario" style="display:none">Calendario</a>
      <button class="nav-link" id="btn-notifiche" style="display:none"><i data-lucide="bell"></i></button>
      <a href="account.html" id="avatar-link" style="display:none">
        <div id="avatar"><i data-lucide="user"></i></div>
      </a>
      <a href="account.html" id="nav-accedi" class="nav-link">Accedi</a>
    </nav>
  </header>
  <section class="city-hero" id="city-hero">
    <div class="city-hero-bg" id="city-hero-bg"></div>
    <div class="city-hero-overlay"></div>
    <div class="city-hero-content">
      <span class="city-eyebrow">Your Nights in</span>
      <button class="city-title-btn" id="btn-cambia-citta" type="button">
        <span id="hero-citta">Torino</span>
        <i data-lucide="chevron-down"></i>
      </button>
      <p id="hero-city-copy">Eventi, locali e serate da scoprire stasera.</p>
    </div>
  </section>
  <div id="vista-mappa">
    <div class="mappa-controlli">
    <div class="tipo-dropdown">
      <button id="btn-apri-tipi" class="tipo-dropdown-btn">
        <i data-lucide="sliders-horizontal"></i>
        Filtra serate
      </button>

      <div id="menu-tipi" class="tipo-dropdown-menu">
        <button class="tipo-opzione attivo" data-tipo="tutti">Tutti</button>
        <button class="tipo-opzione" data-tipo="jazz">Jazz</button>
        <button class="tipo-opzione" data-tipo="live">Live Music</button>
        <button class="tipo-opzione" data-tipo="dj">DJ Set</button>
        <button class="tipo-opzione" data-tipo="karaoke">Karaoke</button>
        <button class="tipo-opzione" data-tipo="sport">Sport</button>
      </div>
    </div>

    <div class="date-toolbar">

    <button id="btn-oggi" class="date-chip attivo">
      Stasera
    </button>

    <button id="btn-domani" class="date-chip">
      Domani
    </button>

    <button id="btn-dopodomani" class="date-chip">
      Weekend
    </button>

    <button id="btn-calendario-data" class="date-calendar-btn" type="button">
      <i data-lucide="calendar"></i>
    </button>

    <button id="btn-gratis" class="date-chip quick-filter" type="button">Gratis</button>
    <button id="btn-live" class="date-chip quick-filter" type="button">Live</button>
    <button id="btn-dj" class="date-chip quick-filter" type="button">DJ set</button>

    <input type="date" id="filtro-data-eventi">
  </div>
  
  <button id="btn-geolocal">
    <i data-lucide="map-pin"></i> Dove sono adesso
  </button>
</div>

<div id="mappa"></div>

    <section id="lista-eventi">
      <h2>Stasera a Torino</h2>
      <div id="cards-container"></div>
    </section>
  </div>

  <div id="vista-calendario" style="display:none;">
    <div class="cal-header">
      <button id="mese-prec"><i data-lucide="arrow-left"></i></button>
      <h2 id="mese-titolo"></h2>
      <button id="mese-succ"><i data-lucide="arrow-right"></i></button>
    </div>
    <div id="cal-griglia"></div>
    <section id="eventi-giorno">
      <h2 id="eventi-giorno-titolo"></h2>
      <div id="eventi-giorno-container"></div>
    </section>
  </div>

  <div id="city-modal" class="city-modal" style="display:none">
    <div class="city-modal-overlay" id="city-modal-overlay"></div>
    <div class="city-modal-panel">
      <button class="city-modal-close" id="city-modal-close" type="button" aria-label="Chiudi selezione citta">
        <i data-lucide="x"></i>
      </button>
      <div class="city-modal-header">
        <span class="city-eyebrow">Scegli la citta</span>
        <h2>Dove usciamo stasera?</h2>
      </div>
      <div class="city-modal-search">
        <i data-lucide="search"></i>
        <input type="text" id="input-citta-modal" placeholder="Cerca citta" />
        <button id="btn-citta-modal" type="button">Vai</button>
        <div id="risultati-ricerca-modal" class="global-search-results modal-search-results"></div>
      </div>
      <div class="city-suggestions">
        <button class="city-suggestion" data-citta="Torino" type="button">Torino</button>
        <button class="city-suggestion" data-citta="Milano" type="button">Milano</button>
        <button class="city-suggestion" data-citta="Roma" type="button">Roma</button>
        <button class="city-suggestion" data-citta="Bologna" type="button">Bologna</button>
        <button class="city-suggestion" data-citta="Firenze" type="button">Firenze</button>
        <button class="city-suggestion" data-citta="Napoli" type="button">Napoli</button>
      </div>
    </div>
  </div>
  <!-- POPUP LOGIN -->
<div id="popup-login" style="display:none">
  <div id="popup-overlay" onclick="chiudiPopupLogin()"></div>
  <div id="popup-box">
    <button id="popup-close" onclick="chiudiPopupLogin()"><i data-lucide="x"></i></button>
    <i data-lucide="bookmark" id="popup-icon"></i>
    <h2>Salva questa serata</h2>
    <p>Accedi per salvare le serate che ti interessano e ritrovarle nel tuo calendario personale.</p>
    <a href="account.html" class="btn-primary" id="popup-btn-accedi">Accedi</a>
    <a href="account.html#registrati" class="btn-secondary" id="popup-btn-registrati">Crea account</a>
  </div>
</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/index.js?v=20260608-fix2"></script>
  <script src="js/i18n.js?v=20260608-fix2"></script>
  <script>window.lucide?.createIcons();</script>
</body>
</html>
