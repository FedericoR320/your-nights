<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | Your Nights</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/admin.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <header>
    <a href="index.html" class="logo">Your Nights</a>
    <nav>
      <a href="index.html" class="nav-link" id="admin-link-eventi">Eventi</a>
      <a href="locali.html" class="nav-link" id="admin-link-locali">Locali</a>
      <a href="account.html" class="nav-link" id="admin-link-account">Account</a>
    </nav>
  </header>

  <main class="admin-page">
    <section class="admin-hero">
      <div>
        <span class="admin-eyebrow">Your Nights admin</span>
        <h1>Pannello admin</h1>
        <p>Gestisci eventi e locali senza passare da Supabase a mano.</p>
      </div>
      <div class="admin-user" id="admin-user">
        <i data-lucide="lock"></i>
        Verifica accesso...
      </div>
    </section>

    <section class="admin-gate" id="admin-gate">
      <div class="admin-state">
        <i data-lucide="loader-2"></i>
        <h2>Controllo accesso</h2>
        <p>Sto verificando il tuo account.</p>
      </div>
    </section>

    <section class="admin-dashboard" id="admin-dashboard" style="display:none">
      <div class="admin-tabs">
        <button class="admin-tab attiva" type="button" data-tab="eventi">
          <i data-lucide="calendar-days"></i>
          Eventi
        </button>
        <button class="admin-tab" type="button" data-tab="locali">
          <i data-lucide="building-2"></i>
          Locali
        </button>
      </div>

      <div class="admin-toolbar">
        <input id="admin-citta" type="text" placeholder="Citta" />
        <button id="admin-refresh" class="admin-btn secondary" type="button">
          <i data-lucide="refresh-cw"></i>
          Aggiorna
        </button>
        <button id="admin-new" class="admin-btn" type="button">
          <i data-lucide="plus"></i>
          Nuovo
        </button>
      </div>

      <div class="admin-layout">
        <section class="admin-panel">
          <div class="admin-panel-head">
            <h2 id="admin-list-title">Eventi</h2>
            <p id="admin-list-status">Caricamento...</p>
          </div>
          <div class="admin-records" id="admin-records"></div>
        </section>

        <section class="admin-panel">
          <div class="admin-panel-head">
            <h2 id="admin-form-title">Nuovo evento</h2>
            <p id="admin-form-status">Compila e salva.</p>
          </div>
          <form id="admin-form" class="admin-form"></form>
        </section>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/admin.js"></script>
  <script src="js/i18n.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
